<!DOCTYPE html>
<html lang="en">
<head>

<title>Page not found · Project Alice</title>

<style>
/* Fonts self-hosted from public/fonts/ (mirrors src/styles/main.css's
   @fontsource imports) instead of a Google Fonts request — this page must
   render fully on-brand even offline (portable/local mode) or if the app's
   own bundle is what's broken. Weights match what this page's CSS actually
   uses: Sora 400/600/700/800, DM Mono 400/500. */
@font-face { font-family: 'Sora'; font-style: normal; font-weight: 400; font-display: swap; src: url('/fonts/sora-latin-400-normal.woff2') format('woff2'); }
@font-face { font-family: 'Sora'; font-style: normal; font-weight: 600; font-display: swap; src: url('/fonts/sora-latin-600-normal.woff2') format('woff2'); }
@font-face { font-family: 'Sora'; font-style: normal; font-weight: 700; font-display: swap; src: url('/fonts/sora-latin-700-normal.woff2') format('woff2'); }
@font-face { font-family: 'Sora'; font-style: normal; font-weight: 800; font-display: swap; src: url('/fonts/sora-latin-800-normal.woff2') format('woff2'); }
@font-face { font-family: 'DM Mono'; font-style: normal; font-weight: 400; font-display: swap; src: url('/fonts/dm-mono-latin-400-normal.woff2') format('woff2'); }
@font-face { font-family: 'DM Mono'; font-style: normal; font-weight: 500; font-display: swap; src: url('/fonts/dm-mono-latin-500-normal.woff2') format('woff2'); }

:root {
  --navy: #1A1A2E;
  --navy-deep: #0E0E20;
  --indigo: #4F46E5;
  --indigo-hover: #4338CA;
  --indigo-mid: #818CF8;
  --gold: #F2B544;
  --surface: #FFFFFF;
  --border: #E8E3DA;
}
* , *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Sora', system-ui, sans-serif;
  background: var(--navy-deep);
  color: #fff;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* ── ambient layers ─────────────────────────────────────── */
.gridbg {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
  background-size: 58px 58px;
  -webkit-mask-image: radial-gradient(ellipse at center, #000 0%, transparent 72%);
  mask-image: radial-gradient(ellipse at center, #000 0%, transparent 72%);
}
.glow {
  position: fixed; top: 46%; left: 50%; width: 820px; height: 820px;
  transform: translate(-50%,-50%); border-radius: 50%; pointer-events: none; z-index: 0;
  background: radial-gradient(circle at center, rgba(129,140,248,.20) 0%, rgba(129,140,248,0) 62%);
}

/* ── ambient twinkles ───────────────────────────────────── */
.twinkles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.spark { position: fixed; color: var(--gold); display: block; }
.spark svg { display: block; }
@keyframes tw {
  0%, 100% { opacity: .08; transform: translate(-50%,-50%) scale(.6); }
  50%      { opacity: .95; transform: translate(-50%,-50%) scale(1); }
}
/* twinkles fade in only after the reveal, when animating */
body.anim .twinkles { opacity: 0; animation: fadeIn 1.1s ease-out 2.6s forwards; }
@keyframes fadeIn { to { opacity: 1; } }

/* ── the vanishing act (only when animating) ────────────── */
/* Layered so centering and animation NEVER share an element:
   .stage centers (grid, no transform) · .card-outer owns enter/poof
   transforms (scale/translateY, no centering translate) · .card-spin owns rotate.
   This is what keeps it portable — a dev can re-center however they like
   without the keyframes fighting the layout. */
.stage { position: fixed; inset: 0; z-index: 3; pointer-events: none; display: none; place-items: center; }
body.anim .stage { display: grid; }
.burst { position: fixed; top: 50%; left: 50%; z-index: 4; pointer-events: none; }
.burst-spark {
  position: fixed; top: 50%; left: 50%; color: var(--gold); opacity: 0;
  animation-name: fly; animation-timing-function: cubic-bezier(.2,.7,.35,1);
  animation-fill-mode: forwards;
}
.burst-spark svg { display: block; width: 100%; height: 100%; }
@keyframes fly {
  0%   { opacity: 0; transform: translate(-50%,-50%) scale(.3) rotate(0deg); }
  14%  { opacity: 1; }
  100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.1) rotate(var(--rot)); }
}

.card-outer {
  width: min(340px, 84vw);
  animation: cardEnter .9s cubic-bezier(.2,.7,.3,1) .25s both,
             cardPoof .6s cubic-bezier(.5,0,.9,1) 2.1s forwards;
}
@keyframes cardEnter {
  from { opacity: 0; transform: scale(.82); }
  to   { opacity: 1; transform: scale(1); }
}
@keyframes cardPoof {
  from { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  to   { opacity: 0; transform: translateY(-72px) scale(.42); filter: blur(9px); }
}
.card-spin { animation: cardSpin 2.35s cubic-bezier(.55,0,1,1) .3s both; transform-origin: center; }
@keyframes cardSpin { from { transform: rotate(0deg); } to { transform: rotate(1120deg); } }

/* Tracker card */
.card {
  position: relative; background: var(--surface); border: 1px solid var(--border);
  border-radius: 13px; padding: 17px 19px;
  box-shadow: 0 34px 64px -26px rgba(0,0,0,.55), 0 6px 18px rgba(0,0,0,.28);
  display: flex; flex-direction: column; gap: 12px;
}
.card .accent { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 13px 0 0 13px; background: var(--indigo-mid); }
.card .r1 { display: flex; align-items: center; gap: 8px; }
.card .id { background: var(--navy); color: #fff; font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; padding: 3px 10px; border-radius: 999px; letter-spacing: .5px; }
.card .badge { background: #DBEAFE; color: #1E40AF; font-size: 10px; font-weight: 500; padding: 3px 10px; border-radius: 999px; }
.card .upd { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 10px; color: #9CA3AF; }
.card .pos { font-size: 15px; font-weight: 600; color: var(--navy); }
.card .co { font-size: 13px; color: #4B5563; }
.card .bar { position: relative; height: 16px; background: #EDE8DF; border-radius: 999px; overflow: hidden; }
.card .fill { position: absolute; inset: 0 auto 0 0; width: 88%; background: #22C55E; border-radius: 999px; }
.card .fill-lbl { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 9px; color: #fff; font-weight: 500; }
.card .skills { display: flex; gap: 5px; }
.card .skill { background: #EEF2FF; color: var(--indigo); border-radius: 5px; font-family: 'DM Mono', monospace; font-size: 10px; padding: 3px 8px; }

/* ── content ────────────────────────────────────────────── */
.wrap {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; align-items: center; text-align: center;
  padding: 40px 28px; max-width: 680px;
}
.eyebrow {
  font-family: 'DM Mono', monospace; font-size: 13px; letter-spacing: 2.4px;
  text-transform: uppercase; color: rgba(255,255,255,.55);
  display: inline-flex; align-items: center; gap: 10px; margin-bottom: 22px;
}
.eyebrow::before { content:""; width: 6px; height: 6px; border-radius:50%; background: var(--gold); box-shadow: 0 0 0 4px rgba(242,181,68,.2); }

.big404 {
  font-weight: 800; font-size: clamp(96px, 20vw, 218px); letter-spacing: -.06em;
  line-height: .9; color: #fff;
}
.big404 .mid { color: var(--indigo-mid); }

.headline {
  font-weight: 700; font-size: clamp(26px, 5.4vw, 38px); letter-spacing: -.04em;
  line-height: 1.06; color: #fff; margin-top: 10px; text-wrap: balance;
}
.sub {
  font-size: clamp(14px, 3.6vw, 16px); font-weight: 400; line-height: 1.5;
  color: rgba(255,255,255,.64); margin-top: 20px; max-width: 460px; text-wrap: balance;
}
.btn {
  margin-top: 32px; border: none; cursor: pointer;
  font-family: 'Sora', sans-serif; font-weight: 600; font-size: 14px;
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--indigo); color: #fff; padding: 13px 24px; border-radius: 9px;
  box-shadow: 0 2px 4px rgba(79,70,229,.28), 0 8px 22px rgba(79,70,229,.22);
  transition: background .14s ease, transform .14s ease, box-shadow .14s ease;
  text-decoration: none;
}
.btn:hover { background: var(--indigo-hover); transform: translateY(-1px); box-shadow: 0 4px 8px rgba(79,70,229,.32), 0 12px 28px rgba(79,70,229,.26); }
.btn:active { transform: translateY(0); }
.btn:focus-visible { outline: 2px solid var(--indigo-mid); outline-offset: 3px; }
.btn svg { transition: transform .14s ease; }
.btn:hover svg { transform: translateX(3px); }

/* ── intro reveal (only when animating) ─────────────────── */
body.anim .eyebrow  { animation: rise .5s ease-out 2.7s both; }
body.anim .big404   { animation: pop .62s cubic-bezier(.2,.8,.3,1.5) 2.5s both; }
body.anim .headline { animation: rise .5s ease-out 3.35s both; }
body.anim .sub      { animation: rise .5s ease-out 3.75s both; }
body.anim .btn      { animation: rise .5s ease-out 4.2s both; }
@keyframes rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pop  { 0% { opacity: 0; transform: scale(.4); } 55% { opacity: 1; } 100% { opacity: 1; transform: scale(1); } }

@media (max-width: 480px) {
  .wrap { padding: 32px 24px; }
  .btn { width: 100%; max-width: 320px; justify-content: center; padding: 15px 24px; }
}
@media (prefers-reduced-motion: reduce) {
  .spark { animation: none !important; opacity: .5 !important; }
}
</style>
</head>
<body>
<div class="gridbg"></div>
<div class="glow"></div>

<div class="twinkles" aria-hidden="true">
  <span class="spark" style="top:22%; left:23%; animation: tw 3.1s ease-in-out infinite;"><svg width="19" height="19" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c1 8 4 11 12 12-8 1-11 4-12 12-1-8-4-11-12-12 8-1 11-4 12-12z"/></svg></span>
  <span class="spark" style="top:27%; left:77%; animation: tw 2.3s ease-in-out .5s infinite;"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c1 8 4 11 12 12-8 1-11 4-12 12-1-8-4-11-12-12 8-1 11-4 12-12z"/></svg></span>
  <span class="spark" style="top:62%; left:19%; animation: tw 3.8s ease-in-out 1.1s infinite;"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c1 8 4 11 12 12-8 1-11 4-12 12-1-8-4-11-12-12 8-1 11-4 12-12z"/></svg></span>
  <span class="spark" style="top:67%; left:80%; animation: tw 2.7s ease-in-out .8s infinite;"><svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c1 8 4 11 12 12-8 1-11 4-12 12-1-8-4-11-12-12 8-1 11-4 12-12z"/></svg></span>
  <span class="spark" style="top:82%; left:33%; animation: tw 2.1s ease-in-out 1.6s infinite;"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c1 8 4 11 12 12-8 1-11 4-12 12-1-8-4-11-12-12 8-1 11-4 12-12z"/></svg></span>
  <span class="spark" style="top:18%; left:65%; animation: tw 4.2s ease-in-out .3s infinite;"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c1 8 4 11 12 12-8 1-11 4-12 12-1-8-4-11-12-12 8-1 11-4 12-12z"/></svg></span>
  <span class="spark" style="top:44%; left:11%; animation: tw 3.4s ease-in-out 2.0s infinite;"><svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c1 8 4 11 12 12-8 1-11 4-12 12-1-8-4-11-12-12 8-1 11-4 12-12z"/></svg></span>
  <span class="spark" style="top:48%; left:89%; animation: tw 2.9s ease-in-out 1.3s infinite;"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c1 8 4 11 12 12-8 1-11 4-12 12-1-8-4-11-12-12 8-1 11-4 12-12z"/></svg></span>
</div>

<!-- vanishing-act overlay (JS-driven, plays once) -->
<div class="stage" aria-hidden="true">
  <div class="card-outer">
    <div class="card-spin">
      <div class="card">
        <span class="accent"></span>
        <div class="r1"><span class="id">J042</span><span class="badge">Applied</span><span class="upd">Updated Jun 12</span></div>
        <div><div class="pos">Product Designer</div><div class="co">Northwind Labs</div></div>
        <div class="bar"><span class="fill"></span><span class="fill-lbl">88% match</span></div>
        <div class="skills"><span class="skill">Figma</span><span class="skill">Design Systems</span><span class="skill">Prototyping</span></div>
      </div>
    </div>
  </div>
</div>

<main class="wrap">
  <div class="eyebrow">Error 404 · page not found</div>
  <div class="big404">4<span class="mid">0</span>4</div>
  <h1 class="headline">This page did a disappearing act.</h1>
  <p class="sub">The link may be broken or the page may have moved. Let's get you back to your applications — nothing was lost.</p>
  <a class="btn" href="/">
    Back to Home
    <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
  </a>
</main>

<script>
(function () {
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduce) return; // show final state immediately, no motion

  document.body.classList.add('anim');

  // Build the staggered sparkle burst that flings out toward the page edges.
  var burst = document.querySelector('.burst');
  var glyph = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c1 8 4 11 12 12-8 1-11 4-12 12-1-8-4-11-12-12 8-1 11-4 12-12z"/></svg>';
  var N = 20;
  var reach = Math.max(window.innerWidth, window.innerHeight) * 0.6;
  for (var i = 0; i < N; i++) {
    var ang = Math.random() * Math.PI * 2;
    var dist = 200 + Math.random() * reach;
    var dx = Math.cos(ang) * dist;
    var dy = Math.sin(ang) * dist * 0.94;
    var size = 10 + Math.random() * 16;
    var s = document.createElement('span');
    s.className = 'burst-spark';
    s.setAttribute('aria-hidden', 'true');
    s.style.setProperty('--dx', dx.toFixed(0) + 'px');
    s.style.setProperty('--dy', dy.toFixed(0) + 'px');
    s.style.setProperty('--rot', (Math.random() * 540 - 270).toFixed(0) + 'deg');
    s.style.width = size.toFixed(0) + 'px';
    s.style.height = size.toFixed(0) + 'px';
    s.style.animationDelay = (2.12 + Math.random() * 0.32).toFixed(2) + 's';
    s.style.animationDuration = (0.62 + Math.random() * 0.4).toFixed(2) + 's';
    s.innerHTML = glyph;
    burst.appendChild(s);
  }

  // Remove the overlay once the act is over so it can't intercept anything.
  // Timeout set to 3600ms to guarantee all randomized sparks (max delay 2.44s + duration 1.02s = 3.46s) complete their animations.
  setTimeout(function () {
    var stage = document.querySelector('.stage');
    if (stage) stage.remove();
    if (burst) burst.remove();
  }, 3600);
})();
</script>
</body>
