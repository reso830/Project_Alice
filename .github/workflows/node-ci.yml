name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run lint

      # CI build supplies stub Vite env vars to satisfy the fail-closed
      # `assertHostedFrontendEnv` plugin in `vite.config.js` (added in
      # feature 018 Phase 01). The bundle is built for verification only —
      # real Supabase credentials are injected at deploy time by the
      # hosting provider.
      - name: Build (with stub Supabase env vars)
        run: npm run build --if-present
        env:
          VITE_SUPABASE_URL: https://stub.supabase.co
          VITE_SUPABASE_ANON_KEY: stub-anon-key
          VITE_AUTH_EMAIL_REDIRECT_URL: https://stub.example/?auth=callback

      - run: npm run test:ci

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-results-node-${{ matrix.node-version }}
          path: test-results/
          if-no-files-found: ignore
