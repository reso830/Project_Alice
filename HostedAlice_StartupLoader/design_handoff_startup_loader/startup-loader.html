<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Project Alice — Hosted App Boot Loader</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #F4F1ED;
  --t1: #1A1A2E;
  --t2: #4B5563;
  --purple: #3D1A8A;
  --gold: #F4A71F;
  --font-ui: 'Sora', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: var(--font-ui); background: var(--bg); }

.splash {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── ambient edge glow (static — no rotation; see README "Known Constraints") ── */
.edge-glow {
  position: absolute;
  inset: 0;
  z-index: 1;
  overflow: hidden;
  pointer-events: none;
}
.edge-glow__base {
  position: absolute;
  inset: 0;
  box-shadow:
    inset 0 0 90px 10px rgba(61, 26, 138, .5),
    inset 0 0 150px 30px rgba(244, 167, 31, .35);
}

/* ── centered lockup ── */
.splash-content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
}
.splash-icon { width: 140px; height: 140px; }
.splash-wordmark { font: 700 26px/1 var(--font-ui); color: var(--t1); letter-spacing: .2px; }
.splash-subtitle { font: 400 14px/1 var(--font-ui); color: var(--t2); }
</style>
</head>
<body>

<div class="splash">
  <div class="edge-glow" aria-hidden="true"><div class="edge-glow__base"></div></div>
  <div class="splash-content">
    <img class="splash-icon" src="alice-sigil-full.svg" alt=""/>
    <div class="splash-wordmark">Project Alice</div>
    <div class="splash-subtitle">Getting things ready…</div>
  </div>
</div>

</body>
</html>
